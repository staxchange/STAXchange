name: Production Readiness

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  production-readiness:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run audit:e2e-commerce && npm run audit:commerce
      - run: npm run audit:repo-strength
      - run: npm run audit:all-strengthened
      - run: npm run audit:all
      - run: npm run supabase:check
      - run: npm run test -- --runInBand
      - run: npm run typecheck --workspace @stax/e2e-readiness
      - run: npm run typecheck --workspace @stax/platform-hardening
      - run: npm run typecheck --workspace @stax/storefront
      - run: npm run typecheck --workspace @stax/admin
      - run: npm run typecheck --workspace @stax/customer
      - run: npm run typecheck --workspace @stax/technician
      - run: npm run typecheck --workspace @stax/commands
      - run: npm run typecheck --workspace @stax/workflows
      - run: npm run typecheck --workspace @stax/authz
      - run: npm run typecheck --workspace @stax/deployment-switchboard
      - run: npm run typecheck --workspace @stax/launch-readiness
      - run: npm run typecheck --workspace @stax/storefront-conversion
      - run: npm run typecheck --workspace @stax/visual-system
      - run: npm run typecheck --workspace @stax/accounting-export
      - run: npm run typecheck --workspace @stax/accounting-export-storage
      - run: npm run typecheck --workspace @stax/finance-export-ui
      - run: npm run build --workspace @stax/storefront
      - run: npm run build --workspace @stax/admin
      - run: npm run build --workspace @stax/customer
      - run: npm run build --workspace @stax/c3-storefront
      - run: npm run build --workspace @stax/technician
      - run: npm run validate:boundaries
